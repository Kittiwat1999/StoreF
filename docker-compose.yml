version: "3.9"
name: "StoreFrontManagement"
services:
  minio:
    image: minio/minio
    container_name: storef-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_S3_PORT}:9000"   # S3 API
      - "${MINIO_WEB_CONSOLE_PORT}:9001"   # Web console (view bucket/files via browser)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network
  web:
    build:
      context: ./Web
      dockerfile: Dockerfile
    container_name: storef-web
    env_file:
      - ./.env
    volumes:
      - ./Web:/app
      - /app/node_modules
    ports:
      - "${VITE_PORT}:5173"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    networks:
      - app_network

  api:
    build:
      context: ./StoreF
      dockerfile: Dockerfile
      target: dev
    container_name: storef-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__DefaultConnection: >-
        Host=${DB_HOST};Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      Jwt__Secret: ${SECRET_KEY}
      ASPNETCORE_URLS: http://+:8000
      Minio__Endpoint: minio:${MINIO_S3_PORT}
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__BucketName: ${MINIO_BUCKET_NAME}
    volumes:
      - ./StoreF/src:/src/src
    ports:
      - "${ASPNETCORE_PORT}:8000"
    networks:
      - app_network

  db:
    image: postgres:15
    container_name: storef-postgres
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5431"
    networks:
      - app_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: storef-pgadmin
    env_file:
      - ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: storef-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
      - minio
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - app_network

volumes:
  postgres_data:
  pgadmin_data:
  minio_data:

networks:
  app_network:
    driver: bridge
